<svg xmlns="http://www.w3.org/2000/svg" viewBox="70 96 1063 1063" role="img" aria-label="Codex Light logo mark">
  <defs>
    <linearGradient id="markFill" x1="433" y1="260" x2="792" y2="982" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6a727a"/>
      <stop offset="0.36" stop-color="#444b52"/>
      <stop offset="0.68" stop-color="#343b42"/>
      <stop offset="1" stop-color="#2a3036"/>
    </linearGradient>

    <linearGradient id="markTopLight" x1="480" y1="250" x2="760" y2="990" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b929a" stop-opacity="0.42"/>
      <stop offset="0.34" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.72" stop-color="#000000" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.34"/>
    </linearGradient>

    <radialGradient id="dotFill" cx="39%" cy="27%" r="78%">
      <stop offset="0" stop-color="#62fb72"/>
      <stop offset="0.38" stop-color="#18df38"/>
      <stop offset="0.74" stop-color="#08c329"/>
      <stop offset="1" stop-color="#05a521"/>
    </radialGradient>

    <radialGradient id="dotGloss" cx="34%" cy="22%" r="63%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="greenGlowFill" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#25ec45" stop-opacity="0.7"/>
      <stop offset="0.42" stop-color="#27ef48" stop-opacity="0.36"/>
      <stop offset="0.72" stop-color="#28ee49" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#28ee49" stop-opacity="0"/>
    </radialGradient>

    <filter id="markShadow" x="180" y="185" width="840" height="880" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="21" stdDeviation="18" flood-color="#11161a" flood-opacity="0.26"/>
      <feDropShadow dx="0" dy="-6" stdDeviation="5" flood-color="#ffffff" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#080a0d" flood-opacity="0.58"/>
    </filter>

    <filter id="softInnerShade" x="210" y="215" width="790" height="820" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="1.25"/>
    </filter>

    <filter id="dotShadow" x="805" y="512" width="240" height="240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#057c1b" flood-opacity="0.58"/>
      <feDropShadow dx="0" dy="-3" stdDeviation="4" flood-color="#a6ffae" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect x="70" y="96" width="1063" height="1063" fill="#f6f8fb"/>

  <path
    d="M 830 405 A 299 299 0 1 0 830 851"
    fill="none"
    stroke="#11161b"
    stroke-width="160"
    stroke-linecap="round"
    opacity="0.16"
    filter="url(#markShadow)"/>

  <path
    d="M 830 405 A 299 299 0 1 0 830 851"
    fill="none"
    stroke="url(#markFill)"
    stroke-width="150"
    stroke-linecap="round"
    filter="url(#markShadow)"/>

  <path
    d="M 830 405 A 299 299 0 1 0 830 851"
    fill="none"
    stroke="url(#markTopLight)"
    stroke-width="150"
    stroke-linecap="round"
    opacity="0.82"
    filter="url(#softInnerShade)"/>

  <circle cx="916" cy="631" r="184" fill="url(#greenGlowFill)"/>
  <circle cx="916" cy="631" r="88" fill="url(#dotFill)" filter="url(#dotShadow)"/>
  <circle cx="916" cy="631" r="72" fill="url(#dotGloss)"/>
  <circle cx="916" cy="631" r="82" fill="none" stroke="#62ff72" stroke-opacity="0.28" stroke-width="4"/>
</svg>
